name: Check Formatting with Ruff

on:
  workflow_call:
  pull_request:

jobs:
  check-lockfile:
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12']
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - name: Check uv Lockfile
        run: uv lock --check
  check-linting:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12']
    steps:
    - uses: actions/checkout@v5
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        enable-cache: true
        python-version: ${{ matrix.python-version }}
    - name: Check Formatting
      run: uv run ruff check
  check-formatting:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12']
    steps:
    - uses: actions/checkout@v5
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        enable-cache: true
        python-version: ${{ matrix.python-version }}
    - name: Check Formatting
      run: uv run ruff format --check
  check-typing:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12']
    steps:
    - uses: actions/checkout@v5
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        enable-cache: true
        python-version: ${{ matrix.python-version }}
    - name: Check typing
      run: uv run mypy .

  check-plugins-rendered:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12']
    steps:
    - uses: actions/checkout@v5
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        enable-cache: true
        python-version: ${{ matrix.python-version }}
    - name: Verify platform-integrations matches a fresh render of plugin-source
      run: uv run python plugin-source/build_plugins.py check

  # Supersedes main's `unit-tests` job (added in #289): this runs the full
  # suite with all extras installed, a strict superset of `pytest tests/unit/`,
  # and does so credential-free. Adding main's job back would only duplicate
  # coverage with a credentialed checkout.
  run-tests:
    runs-on: ubuntu-latest
    # This job runs PR-authored test code (pull_request trigger). It must stay
    # credential-free so a malicious PR cannot exfiltrate secrets or the
    # checkout token. The cpex-guarded hook tests mock `completion` and need no
    # real key; live/e2e tests are deselected by the pytest `addopts`
    # (`-m 'not llm and not e2e'`) the composite action inherits. Credentialed
    # coverage lives in release-github.yaml's own run-tests job.
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12']
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      # Runs the suite with all extras installed (uv sync --all-extras in the
      # composite action), so the cpex-guarded hook tests actually gate PRs.
      - uses: ./.github/actions/run-tests

  ui-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'altk_evolve/frontend/ui/package-lock.json'
      - name: Install dependencies
        working-directory: altk_evolve/frontend/ui
        run: npm install
      - name: Run UI Unit Tests
        working-directory: altk_evolve/frontend/ui
        run: npm run test -- --run

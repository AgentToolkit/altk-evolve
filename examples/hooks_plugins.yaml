# Example plugin configuration for the altk_evolve memory hook seam, in the
# YAML format of the shipped CPEX execution engine.
#
# Point EvolveConfig at this file to enable plugins without touching code:
#
#     from altk_evolve.config.evolve import EvolveConfig
#     from altk_evolve.config.hooks import HooksConfig
#
#     config = EvolveConfig(hooks=HooksConfig(enabled=True, plugins_yaml="examples/hooks_plugins.yaml"))
#
# The "edit YAML to change behavior" property: comment a plugin out (or set
# `mode: disabled`) and restart — no code change needed. Jinja templating is
# supported for values, e.g. `redaction_text: "{{ env.REDACTION_TEXT }}"`.
#
# Requires: pip install 'altk-evolve[hooks]'   (plus [pii] for the PII filter)

plugins:
  # Stamps canonical metadata on every write: copies task_id -> trace_id when
  # only the former is present (MCP-saved trajectories), and adds created_at.
  - name: metadata_normalizer
    kind: altk_evolve.hooks.plugins.normalizer.MetadataNormalizerPlugin
    description: Canonical metadata stamping on memory writes
    hooks:
      - memory_pre_write
    mode: transform        # serial, chained, modifying, non-halting
    priority: 40           # lower runs earlier
    on_error: fail         # fail-closed: a crash halts the write, never passes bad data through
    config:
      stamp_trace_id: true
      stamp_created_at: true

  # Stamps last_accessed (ISO-8601 UTC) on entities returned by public reads.
  # Read cost: fire-and-forget tasks are awaited at the sync seam, so every
  # public read pays one metadata write per returned entity before it returns
  # (~3.7ms vs ~0.1ms for a 10-entity filesystem read; N extra round trips
  # per read on milvus/postgres). Enable only where audit trails justify it.
  - name: access_stamp
    kind: altk_evolve.hooks.plugins.access_stamp.AccessStampPlugin
    description: Access auditing on memory reads
    hooks:
      - memory_post_read
    mode: fire_and_forget  # side-effect only; cannot modify or block the read
    priority: 50
    on_error: fail         # fail-closed default; the plugin still guards its own stamping so the read never fails

  # Regex PII redaction on memory writes and LLM egress.
  # Requires: pip install 'altk-evolve[pii]'
  - name: pii_filter_memory
    kind: altk_evolve.hooks.plugins.pii.PIIFilterMemoryPlugin
    description: Regex PII masking on memory writes and LLM egress
    hooks:
      - memory_pre_write
      - llm_pre_call
    # sequential, NOT transform: CPEX downgrades continue_processing=False->True
    # in transform mode, so a redactor there can never block. sequential keeps
    # both redaction-chaining and the ability to halt on unredactable PII.
    mode: sequential
    priority: 10           # redact before the normalizer sees content
    on_error: fail         # fail-closed: never pass unredacted content through
    config:
      detect_email: true
      detect_ssn: true
      detect_phone: true
      default_mask_strategy: redact
      redaction_text: "[REDACTED]"

  # ── regex -> semantic: the seam's selling point ────────────────────
  #
  # The regex filter above has NO NER: measured on 200 ai4privacy rows it hits
  # recall 0.13 (precision 1.00) overall and 0.00 on firstname/lastname — it
  # catches identifiers, not people. Semantic (NER) redaction via IBM READI
  # reaches 0.48 recall at precision 1.00, with names at 0.92-1.00.
  #
  # Switching is a YAML edit, not a code change: comment out `pii_filter_memory`
  # above and uncomment `readi_semantic_pii` below (or run both — they chain,
  # regex for structured identifiers plus NER for names). Costs: NER is
  # CPU-heavy next to a Rust regex pass, and the first call downloads model
  # weights (~460MB for en_core_web_trf).
  #
  # Requires: pip install 'altk-evolve[readi]'
  #
  # - name: readi_semantic_pii
  #   kind: altk_evolve.hooks.plugins.readi.ReadiSemanticPIIPlugin
  #   description: Semantic (NER) PII masking on memory writes and LLM egress
  #   hooks:
  #     - memory_pre_write
  #     - llm_pre_call
  #   mode: sequential     # same reason as above: transform mode can never block
  #   priority: 10
  #   on_error: fail       # fail-closed: a crashing NER model must not pass PII through
  #   config:
  #     # default | spacy | hf | presidio.
  #     #   default  -> READI's own PII pipeline (spaCy en_core_web_trf). English.
  #     #   spacy    -> any spaCy pipeline; the multilingual path. Set readi_model.
  #     #   hf       -> any HF pipeline("ner") model id. Set readi_model.
  #     #   presidio -> Microsoft Presidio (READI hardcodes language="en"; see docs).
  #     readi_extractor: default
  #     # A LANGUAGE-MATCHED model is decisive: on Japanese, overall recall goes
  #     # 0.15 (English model) -> 0.92 (ja_core_news_trf).
  #     # readi_extractor: spacy
  #     # readi_model: ja_core_news_trf
  #     # readi_language: ja
  #     redaction_text: "[REDACTED]"
  #     redact_metadata: false   # metadata often holds ids/paths redaction would corrupt

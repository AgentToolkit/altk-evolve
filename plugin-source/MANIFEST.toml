# Plugin source manifest — canonical source-of-truth for platform-integrations/.
#
# Each [platforms.<name>] table declares one platform. plugin_root is the
# directory under platform-integrations/ that the renderer writes into; every
# other key in the table is passed to Jinja2 as a per-platform context variable
# when rendering .j2 source files. The Jinja2 environment also receives
# `platform = "<name>"` so templates can branch on the active platform.
#
# Optional [[platforms.<name>.target_rewrites]] entries apply regex
# (pattern → replacement) substitutions to each entry's target path under that
# platform. Used today to route bob's skill folders through the
# `evolve-lite-` prefix it requires.
#
# Each [[files]] entry names a path under plugin-source/. `target` is
# optional; when omitted it defaults to `source` with a trailing `.j2`
# stripped. `platforms` is optional; when omitted it defaults to every
# declared platform. Sources ending in `.j2` are rendered through Jinja2;
# everything else is copied verbatim.
#
# This file is hand-edited; everything under platform-integrations/ that
# corresponds to a manifest entry is generated and should not be hand-edited.
# The CI gate (`just check-plugins-rendered`) enforces this invariant.

[platforms.claude]
plugin_root = "platform-integrations/claude/plugins/evolve-lite"
forked_context = true
user_skills_dir = "~/.claude/skills"
save_example_script_root = "${CLAUDE_PLUGIN_ROOT}/skills"

[platforms.claw-code]
plugin_root = "platform-integrations/claw-code/plugins/evolve-lite"
user_skills_dir = "~/.claw/skills"
save_example_script_root = "~/.claw/skills"

[platforms.codex]
plugin_root = "platform-integrations/codex/plugins/evolve-lite"
user_skills_dir = "plugins/evolve-lite/skills"
save_example_script_root = "plugins/evolve-lite/skills"

[platforms.bob]
plugin_root = "platform-integrations/bob/evolve-lite"
user_skills_dir = ".bob/skills"
save_example_script_root = ".bob/skills"
# Bob has no plugin-namespace concept; skill folders are flat under
# `.bob/skills/`. Collapse the source `skills/evolve-lite/<name>/` layout
# to `skills/evolve-lite-<name>/` for bob's render output.
[[platforms.bob.target_rewrites]]
pattern = "^skills/evolve-lite/([^/]+)/"
replacement = "skills/evolve-lite-\\1/"

# Shared library — shipped to every platform. Codex and bob previously
# walked up from their plugin trees to find claude's lib/ copy in
# monorepo-dev; now each platform has its own.
[[files]]
source = "lib/__init__.py"

[[files]]
source = "lib/audit.py"

[[files]]
source = "lib/config.py"

[[files]]
source = "lib/entity_io.py"

# Skill scripts. claude/claw-code/codex use the source path as-is; bob's
# target_rewrite prefixes the skill folder with `evolve-lite-`.

[[files]]
source = "skills/evolve-lite/learn/scripts/save_entities.py"

[[files]]
source = "skills/evolve-lite/publish/scripts/publish.py"

[[files]]
source = "skills/evolve-lite/subscribe/scripts/subscribe.py"

[[files]]
source = "skills/evolve-lite/unsubscribe/scripts/unsubscribe.py"

[[files]]
source = "skills/evolve-lite/sync/scripts/sync.py"

[[files]]
source = "skills/evolve-lite/recall/scripts/retrieve_entities.py"

[[files]]
source = "skills/evolve-lite/save-trajectory/scripts/save_trajectory.py"

# Templated SKILL.md files. Each .j2 is the unified prose for all four
# platforms — codex's structure / wording is the base, with Jinja2 branches
# for forked-context behavior, hook-vs-manual descriptions, and per-platform
# script invocations (resolved through the `invoke` macro in _macros.j2).

[[files]]
source = "skills/evolve-lite/learn/SKILL.md.j2"

[[files]]
source = "skills/evolve-lite/recall/SKILL.md.j2"

[[files]]
source = "skills/evolve-lite/publish/SKILL.md.j2"

[[files]]
source = "skills/evolve-lite/subscribe/SKILL.md.j2"

[[files]]
source = "skills/evolve-lite/unsubscribe/SKILL.md.j2"

[[files]]
source = "skills/evolve-lite/sync/SKILL.md.j2"

[[files]]
source = "skills/evolve-lite/save-trajectory/SKILL.md.j2"

[[files]]
source = "skills/evolve-lite/save/SKILL.md.j2"

# Stop hooks. Only claude has an on_stop hook contract today; the files
# ship to every platform as inert artifacts (no harm if never invoked).
# Per-platform behavior tightening is tracked as follow-up issues.
[[files]]
source = "skills/evolve-lite/learn/scripts/on_stop.py"

[[files]]
source = "skills/evolve-lite/learn/scripts/on_stop.sh"

[[files]]
source = "skills/evolve-lite/save-trajectory/scripts/on_stop.py"

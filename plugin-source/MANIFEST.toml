# Plugin source manifest — canonical source-of-truth for platform-integrations/.
#
# Each [platforms.<name>] table declares one platform. plugin_root is the
# directory under platform-integrations/ that the renderer writes into; every
# other key in the table is passed to Jinja2 as a per-platform context variable
# when rendering .j2 source files. The Jinja2 environment also receives
# `platform = "<name>"` so templates can branch on the active platform.
#
# Each [[files]] entry names a path under plugin-source/, the per-platform
# target path under plugin_root, and the list of platforms that receive it.
# Sources ending in `.j2` are rendered through Jinja2; everything else is
# copied verbatim.
#
# This file is hand-edited; everything under platform-integrations/ that
# corresponds to a manifest entry is generated and should not be hand-edited.
# The CI gate (`just check-plugins-rendered`) enforces this invariant.

[platforms.claude]
plugin_root = "platform-integrations/claude/plugins/evolve-lite"
forked_context = true
user_skills_dir = "~/.claude/skills"
save_example_script_root = "${CLAUDE_PLUGIN_ROOT}/skills"

[platforms.claw-code]
plugin_root = "platform-integrations/claw-code/plugins/evolve-lite"
forked_context = false
user_skills_dir = "~/.claw/skills"
save_example_script_root = "~/.claw/skills"

[platforms.codex]
plugin_root = "platform-integrations/codex/plugins/evolve-lite"
forked_context = false

[platforms.bob]
plugin_root = "platform-integrations/bob/evolve-lite"
forked_context = false

# Verbatim copies — file content is identical across every listed platform.
[[files]]
source = "lib/__init__.py"
target = "lib/__init__.py"
platforms = ["claude", "claw-code"]

[[files]]
source = "lib/audit.py"
target = "lib/audit.py"
platforms = ["claude", "claw-code"]

[[files]]
source = "lib/config.py"
target = "lib/config.py"
platforms = ["claude", "claw-code"]

[[files]]
source = "lib/entity_io.py"
target = "lib/entity_io.py"
platforms = ["claude", "claw-code"]


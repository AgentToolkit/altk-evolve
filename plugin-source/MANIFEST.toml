# Templated SKILL.md files. Each .j2 is the unified prose for all four
# platforms — codex's structure / wording is the base, with Jinja2 branches
# for forked-context behavior, hook-vs-manual descriptions, and per-platform
# script invocations (resolved through the `invoke` macro in _macros.j2).
#
# Bob's installed skill folder takes the `evolve-lite-` prefix (commit
# 07a171c) so a second [[files]] entry per skill points at that target.

[[files]]
source = "skills/learn/SKILL.md.j2"
target = "skills/learn/SKILL.md"
platforms = ["claude", "claw-code", "codex"]

[[files]]
source = "skills/learn/SKILL.md.j2"
target = "skills/evolve-lite-learn/SKILL.md"
platforms = ["bob"]

